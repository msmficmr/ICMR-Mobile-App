name: mhealth
description: M Health.
publish_to: 'none'
version: 0.6.3+10

environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
      sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.5
  go_router: ^7.0.1
  provider: ^6.0.5
  dropdown_search: ^5.0.6
  geolocator: ^13.0.3
  fluttertoast: ^8.2.12
  connectivity_plus: ^4.0.1
  intl: ^0.20.2
  file_picker: ^9.2.1
  # pdf_render: 
  pin_code_fields: ^8.0.1
  flutter_pdfview: ^1.4.0+1



  shared_preferences: ^2.0.8
  skeletonizer: ^2.1.3
  permission_handler: ^11.3.1
  image_picker: ^1.0.1
  dotted_border: ^2.0.0+3
  http_interceptor: ^1.0.2
  http: ^0.13.6
  isar: ^3.1.0+1
  path_provider: ^2.1.1
  isar_flutter_libs: ^3.1.0+1
  uuid: ^4.5.1
  flutter_signature_pad: ^3.0.1 
  tuple: ^2.0.2
  encrypt: ^5.0.3
  device_info_plus: ^11.1.1
  probeintegration:
    path: ./probeintegration

dev_dependencies:
  flutter_test:
    sdk: flutter  

  flutter_lints: ^2.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.6
dependency_overrides:
  intl: ^0.20.2
flutter:

  uses-material-design: true
  assets:
    - assets/icons/
    - assets/fonts/
    - assets/language/
    - assets/json/
    - assets/images/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-100.ttf
          weight: 100
        - asset: assets/fonts/Montserrat-200.ttf
          weight: 200
        - asset: assets/fonts/Montserrat-300.ttf
          weight: 300
        - asset: assets/fonts/Montserrat-400.ttf
          weight: 400
        - asset: assets/fonts/Montserrat-500.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-600.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-700.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-800.ttf
          weight: 800
        - asset: assets/fonts/Montserrat-900.ttf
          weight: 900
